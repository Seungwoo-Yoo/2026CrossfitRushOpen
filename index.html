<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 CrossFit Open Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #111827; color: #d1d5db; }
        
        /* 탭 스타일 */
        .tab { transition: all 0.2s ease-in-out; border-bottom: 2px solid transparent; color: #9ca3af; }
        .tab.active { color: #facc15; border-color: #facc15; font-weight: 700; }

        /* 지점 선택 버튼 스타일 (모바일 최적화) */
        .branch-btn { transition: all 0.2s; opacity: 0.6; filter: grayscale(100%); transform: scale(0.98); }
        .branch-btn.active { opacity: 1; filter: grayscale(0%); transform: scale(1.0); border-color: #facc15; background-color: #374151; box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }

        .loader { border: 3px solid #4b5563; border-top: 3px solid #facc15; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 팀 아이콘 스타일 (모바일에서 더 작게) */
        .team-icon {
            width: 20px; height: 20px; border-radius: 50%; object-fit: cover;
            margin-left: 4px; vertical-align: middle; display: inline-block;
        }

        /* 📱 모바일 전용 테이블 조정 */
        /* [수정] 모바일 테이블 여백 및 스타일 최적화 */
        @media (max-width: 640px) {
            th, td { 
                padding: 0.5rem 0.25rem !important; /* 좌우 여백을 더 줄임 */
            }
            .team-icon { width: 16px; height: 16px; } 
            h1 { font-size: 1.5rem !important; }
        }

        /* [추가] 성별 헤더 색상 스타일 */
        .header-male { background-color: rgba(30, 58, 138, 0.5); color: #bfdbfe; } /* 남색 계열 */
        .header-female { background-color: rgba(131, 24, 67, 0.5); color: #fbcfe8; } /* 분홍 계열 */

        /* 성별 버튼 활성화 스타일 */
        .gender-btn.active {
            background-color: #facc15; /* 노란색 */
            color: #111827; /* 어두운 글씨 */
            border-color: #facc15;
            transform: scale(1.05);
        }

        /* 클릭해서 열리는 상세 정보 행 스타일 */
        .detail-row {
            background-color: #1f2937; /* 더 어두운 배경 */
            border-bottom: 2px solid #374151;
        }
        .detail-content {
            padding: 10px;
            color: #d1d5db;
            font-size: 0.85rem;
        }
        /* 클릭 가능한 행에 마우스 올렸을 때 */
        .cursor-pointer:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

    </style>
</head>
<body class="min-h-screen bg-gray-900">
    <div class="container mx-auto px-2 py-4 sm:p-6 lg:p-8 max-w-3xl"> <header class="text-center mb-4">
            <h1 class="text-2xl sm:text-4xl font-bold text-yellow-300 mb-1 leading-tight">
               2026 CrossFit Rush Open Leaderboard
            </h1>
            <h2 id="main-title" class="text-sm sm:text-xl font-medium text-gray-300 mb-4">
                "크로스핏에 미친 우리들의 잔치날"
            </h2>

            <div class="flex justify-center gap-2 mb-4">
                <button onclick="changeBranch('중화')" id="btn-중화" class="branch-btn active flex items-center justify-center gap-2 py-2 px-4 bg-gray-800 rounded-lg border border-gray-700 w-32">
                    <span class="text-lg">🔥</span>
                    <span class="font-bold text-white text-sm">중화점</span>
                </button>
                <button onclick="changeBranch('군자')" id="btn-군자" class="branch-btn flex items-center justify-center gap-2 py-2 px-4 bg-gray-800 rounded-lg border border-gray-700 w-32">
                    <span class="text-lg">💪</span>
                    <span class="font-bold text-white text-sm">군자점</span>
                </button>
            </div>
        </header>

        <div class="border-b border-gray-700 mb-4 overflow-x-auto">
            <nav class="flex justify-between sm:justify-center min-w-full" aria-label="Tabs">
                <button data-tab="list" class="tab flex-1 py-2 text-xs sm:text-base text-center whitespace-nowrap">명단</button>
                <button data-tab="event1" class="tab flex-1 py-2 text-xs sm:text-base text-center whitespace-nowrap">EV 1</button>
                <button data-tab="event2" class="tab flex-1 py-2 text-xs sm:text-base text-center whitespace-nowrap">EV 2</button>
                <button data-tab="event3" class="tab flex-1 py-2 text-xs sm:text-base text-center whitespace-nowrap">EV 3</button>
                <button data-tab="total" class="tab active flex-1 py-2 text-xs sm:text-base text-center whitespace-nowrap">TOTAL</button>
            </nav>
        </div>

        <div id="gender-tabs" class="flex justify-center gap-3 mb-4 hidden">
            <button onclick="changeGender('male')" id="btn-male" class="gender-btn active px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold bg-gray-800 text-gray-400 border border-gray-600 transition-all hover:bg-gray-700">
                🏋️‍♂️ 남자 (Male)
            </button>
            <button onclick="changeGender('female')" id="btn-female" class="gender-btn px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold bg-gray-800 text-gray-400 border border-gray-600 transition-all hover:bg-gray-700">
                🏋️‍♀️ 여자 (Female)
            </button>
        </div>

        <div id="wod-section" class="my-4 text-center hidden">
            <button id="wod-toggle-button" class="bg-yellow-600/90 hover:bg-yellow-600 text-white font-bold py-1.5 px-4 rounded-full text-xs transition-colors duration-200">
                WOD DETAILS ▼
            </button>
            <div id="wod-content" class="hidden mt-2 p-3 bg-gray-800 rounded-lg text-left text-xs sm:text-sm text-gray-300 whitespace-pre-wrap border border-gray-700 leading-relaxed"></div>
        </div>

        <div id="status" class="h-6 flex items-center justify-center text-xs text-gray-500 mb-2"></div>
        <div id="tableContainer" class="overflow-x-auto min-h-[300px] pb-10"></div>
    </div>

<script>
// --- 설정 부분 ---
    const API_KEY = 'AIzaSyDVAAXL9Tfcqq_7RsKIVhjBZgboDCved5g'; 
    const SPREADSHEET_ID = '18utoWLAV5n2Wknu-LdgS5rKLVdCQK0XuSrB42D_0RZw'; 
    
    let currentBranch = '중화';
    let currentEvent = 'total';
    let currentGender = 'male'; // ✨ 성별 상태 추가 (기본: 남자)
    const REFRESH_INTERVAL = 15000;

    // 기존 SHEET_CONFIG 부분을 아래처럼 변경
    const SHEET_CONFIG = {
        list:   { prefix: '명단',   range: '!A1:C100', type: 'standard', wodCell: null },
        event1: { prefix: 'Event1', range: '!A1:J100', type: 'standard', wodCell: '!L1' },
        event2: { prefix: 'Event2', range: '!A1:J100', type: 'standard', wodCell: '!L1' },
        event3: { prefix: 'Event3', range: '!A1:J100', type: 'standard', wodCell: '!L1' },
        // ✨ Total 범위를 W열(한국 기록)까지 가져오도록 확장!
        total:  { prefix: 'Total',  range: '!A1:W100', type: 'total_special', wodCell: null }
    };
       
    const tableContainer = document.getElementById('tableContainer');
    const statusDiv = document.getElementById('status');
    const wodSection = document.getElementById('wod-section');
    const wodContent = document.getElementById('wod-content');
    const wodToggleButton = document.getElementById('wod-toggle-button');
    const genderTabs = document.getElementById('gender-tabs'); 

    document.addEventListener('DOMContentLoaded', () => {
        initializeTabs();
        updateGenderTabVisibility(); 
        fetchAndDisplayData();
        setInterval(() => fetchAndDisplayData(), REFRESH_INTERVAL);
    });

    function changeBranch(branchName) {
        currentBranch = branchName;
        document.querySelectorAll('.branch-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${branchName}`).classList.add('active');
        fetchAndDisplayData();
    }

    function changeGender(gender) {
        currentGender = gender;
        
        document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${gender}`).classList.add('active');
        
        fetchAndDisplayData();
    }

    function initializeTabs() {
        const tabs = document.querySelectorAll('button[data-tab]');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                currentEvent = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                updateGenderTabVisibility(); 
                fetchAndDisplayData();
            });
        });
        wodToggleButton.addEventListener('click', () => wodContent.classList.toggle('hidden'));
    }

    function updateGenderTabVisibility() {
        if (currentEvent === 'list') {
            genderTabs.classList.add('hidden');
            wodSection.style.display = 'none';
        } else {
            genderTabs.classList.remove('hidden');
            if (currentEvent === 'total') {
                wodSection.style.display = 'none';
            } else {
                wodSection.style.display = 'block';
                wodContent.classList.add('hidden');
            }
        }
    }

    async function fetchAndDisplayData() {
        showLoading();
        const config = SHEET_CONFIG[currentEvent];
        if (!config) return;
        
// ✨ [수정] Total 탭일 경우 시트 이름을 Total_지점명_성별 (예: Total_중화_남자) 순서로 변경
        let sheetName = `${config.prefix}_${currentBranch}`;
        if (currentEvent === 'total') {
            const genderSuffix = currentGender === 'male' ? '남자' : '여자';
            sheetName = `${config.prefix}_${currentBranch}_${genderSuffix}`;
        }
        
        try {
            const rawData = await fetchData(`'${sheetName}'${config.range}`);
            
            if (config.wodCell) {
                try {
                    const wodRes = await fetchData(`'${sheetName}'${config.wodCell}`);
                    wodContent.textContent = wodRes?.[0]?.[0] || "WOD 설명 없음";
                } catch (e) { wodContent.textContent = ""; }
            }

            if (rawData && rawData.length > 0) {
                let displayData = [];

                // fetchAndDisplayData() 함수 내부
                if (currentEvent === 'list') {
                    displayData = rawData; 
                } else if (currentEvent === 'total') {
                    // ✨ W열(22번 인덱스)까지 가져오기 위해 23으로 변경
                    displayData = rawData.map(row => row.slice(0, 23)); 
                } else {
                    if (currentGender === 'male') displayData = rawData.map(row => row.slice(0, 5));
                    else displayData = rawData.map(row => row.slice(5, 10));
                }

                // 빈 행 제거
                displayData = displayData.filter(row => row.some(c => c && c.trim() !== ''));

                if (displayData.length > 0) {
                    if (config.type === 'total_special') renderTotalSpecial(displayData);
                    else renderStandardTable(displayData);
                    
                    const genderText = (currentEvent !== 'list') ? (currentGender === 'male' ? '[남자]' : '[여자]') : '';
                    updateStatus(`업데이트: ${new Date().toLocaleTimeString()} (${currentBranch} ${genderText})`);
                } else {
                    displayError(`데이터 없음 (${sheetName})`);
                }
            } else {
                displayError(`데이터 없음 (${sheetName})`);
            }
        } catch (error) {
            console.error(error);
            displayError("불러오기 실패");
        }
    }

    async function fetchData(range) {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
        const res = await fetch(url);
        const json = await res.json();
        if (json.error) throw new Error(json.error.message);
        return json.values;
    }

    function renderStandardTable(data) {
        tableContainer.innerHTML = '';
        const table = document.createElement('table');
        table.className = "w-full divide-y divide-gray-700 text-xs sm:text-sm table-fixed"; 
        
        const thead = document.createElement('thead');
        thead.className = "bg-gray-800";

        if (currentEvent === 'list') {
            const superRow = document.createElement('tr');
            const superTh = document.createElement('th');
            superTh.colSpan = data[0].length; 
            superTh.textContent = "참여명단";
            superTh.className = "py-3 text-center text-base sm:text-lg font-bold text-yellow-400 border-b border-gray-700";
            superRow.appendChild(superTh);
            thead.appendChild(superRow);
        }

        const headerRow = document.createElement('tr');
        const headers = data[0]; 
        headers.forEach((text, idx) => {
            const th = document.createElement('th');
            let headerText = text;
            let headerClass = "py-2 px-1 text-center font-semibold text-gray-200 tracking-tight break-words";

            if (text.includes('남')) { headerText = '🏋️‍♂️ ' + text; headerClass += " header-male"; } 
            else if (text.includes('여')) { headerText = '🏋️‍♀️ ' + text; headerClass += " header-female"; }

            if (currentEvent === 'list' && idx === 1) { headerClass += " border-r-2 border-gray-600"; }

            th.className = headerClass;
            th.innerHTML = headerText;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        const tbody = document.createElement('tbody');
        tbody.className = "divide-y divide-gray-800";

        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if (!row.some(c => c && c.trim() !== '')) continue;

            const tr = document.createElement('tr');
            tr.className = `${(i % 2 === 0) ? 'bg-gray-800/50' : 'bg-transparent'} hover:bg-white/10`;

            for (let j = 0; j < headers.length; j++) {
                const cell = row[j] || ''; 
                const td = document.createElement('td');
                let tdClass = "px-1 py-3 text-center text-gray-300 whitespace-nowrap overflow-hidden text-ellipsis";

                if (currentEvent === 'list' && j === 1) { tdClass += " border-r-2 border-gray-600"; }
                
                td.className = tdClass;
                let content = cell;
                if (content === '') content = '&nbsp;';

                if (currentEvent !== 'list' && j === 0) { 
                    const rank = cell.trim();
                    if (rank === '1') content = '<span class="text-base">🥇</span>';
                    else if (rank === '2') content = '<span class="text-base">🥈</span>';
                    else if (rank === '3') content = '<span class="text-base">🥉</span>';
                }

                td.innerHTML = content;
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(thead);
        table.appendChild(tbody);
        tableContainer.appendChild(table);
    }
    
    function renderTotalSpecial(data) {
        tableContainer.innerHTML = '';
        const table = document.createElement('table');
        table.className = "w-full text-xs sm:text-sm table-fixed border-collapse"; 

        const thead = document.createElement('thead');
        thead.className = "bg-gray-800 text-gray-200";
        
        thead.innerHTML = `
            <tr>
                <th class="py-3 w-[15%] text-center font-semibold">순위</th>
                <th class="py-3 w-[60%] text-center font-semibold">이름</th>
                <th class="py-3 w-[25%] text-center font-semibold">Total 점수</th>
            </tr>
        `;
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        tbody.className = "divide-y divide-gray-800";

        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if (!row[1] || row[1] === '') continue; 

            const rank = row[0] || '-';
            const name = row[1] || '';
            const score = row[2] || '0';
            
            // 📍 지점 기록 (D~I)
            const e1_rank = row[3] || '-', e1_rec = row[4] || '-';
            const e2_rank = row[5] || '-', e2_rec = row[6] || '-';
            const e3_rank = row[7] || '-', e3_rec = row[8] || '-';

            // 🌎 세계 기록 (K~P -> 인덱스 10~15)
            const w1_rank = row[10] || '-', w1_rec = row[11] || '-';
            const w2_rank = row[12] || '-', w2_rec = row[13] || '-';
            const w3_rank = row[14] || '-', w3_rec = row[15] || '-';

            // 🇰🇷 한국 기록 (R~W -> 인덱스 17~22)
            const k1_rank = row[17] || '-', k1_rec = row[18] || '-';
            const k2_rank = row[19] || '-', k2_rec = row[20] || '-';
            const k3_rank = row[21] || '-', k3_rec = row[22] || '-';

            let rankDisplay = `<span class="text-gray-300 font-bold">${rank}</span>`;
            if(rank === '1') rankDisplay = '<span class="text-lg">🥇</span>';
            else if(rank === '2') rankDisplay = '<span class="text-lg">🥈</span>';
            else if(rank === '3') rankDisplay = '<span class="text-lg">🥉</span>';

            // --- 메인 행 ---
            const mainTr = document.createElement('tr');
            mainTr.className = "cursor-pointer transition-colors border-b border-gray-800 h-14";
            mainTr.onclick = () => toggleDetail(i); 

            mainTr.innerHTML = `
                <td class="text-center py-2">${rankDisplay}</td>
                <td class="text-center py-2 font-medium text-white">
                    <div class="flex items-center justify-center gap-1">
                        ${name} <span class="text-[10px] text-gray-500">▼</span>
                    </div>
                </td>
                <td class="text-center py-2 font-bold text-yellow-400 text-base">${score}</td>
            `;

            // --- 상세 행 (클릭 영역 추가) ---
            const detailTr = document.createElement('tr');
            detailTr.id = `detail-${i}`;
            detailTr.className = "hidden detail-row"; 

            // 깔끔하게 등수를 표시해주는 도우미 함수 (100이나 - 이면 - 출력)
            const fmtRank = (r) => (r === '100' || r === '-' || !r) ? '-' : r + '등';

            detailTr.innerHTML = `
                <td colspan="3" class="p-0">
                    <div class="cursor-pointer bg-gray-800/60 hover:bg-gray-800 transition-colors p-3" onclick="cycleDetailView(${i})">
                        
                        <div class="text-center text-[10px] text-gray-400 mb-2 flex justify-center items-center gap-2">
                            <span id="badge-local-${i}" class="px-2 py-0.5 rounded bg-yellow-600 text-white font-bold">지점 등수</span>
                            <span id="badge-world-${i}" class="px-2 py-0.5 rounded bg-gray-700 text-gray-400">세계 등수</span>
                            <span id="badge-korea-${i}" class="px-2 py-0.5 rounded bg-gray-700 text-gray-400">한국 등수</span>
                            <span class="ml-1 text-gray-500">🔄 탭(클릭)해서 변경</span>
                        </div>

                        <div id="view-local-${i}" class="detail-content grid grid-cols-3 gap-2 text-center">
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 1</div>
                                <div class="text-white font-bold">${fmtRank(e1_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${e1_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 2</div>
                                <div class="text-white font-bold">${fmtRank(e2_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${e2_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 3</div>
                                <div class="text-white font-bold">${fmtRank(e3_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${e3_rec})</div>
                            </div>
                        </div>

                        <div id="view-world-${i}" class="hidden detail-content grid grid-cols-3 gap-2 text-center">
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 1 (🌎)</div>
                                <div class="text-white font-bold">${fmtRank(w1_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${w1_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 2 (🌎)</div>
                                <div class="text-white font-bold">${fmtRank(w2_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${w2_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 3 (🌎)</div>
                                <div class="text-white font-bold">${fmtRank(w3_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${w3_rec})</div>
                            </div>
                        </div>

                        <div id="view-korea-${i}" class="hidden detail-content grid grid-cols-3 gap-2 text-center">
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 1 (🇰🇷)</div>
                                <div class="text-white font-bold">${fmtRank(k1_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${k1_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 2 (🇰🇷)</div>
                                <div class="text-white font-bold">${fmtRank(k2_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${k2_rec})</div>
                            </div>
                            <div class="bg-gray-800/80 rounded p-2 border border-gray-700">
                                <div class="text-yellow-500 font-bold text-[10px] sm:text-xs mb-1">Event 3 (🇰🇷)</div>
                                <div class="text-white font-bold">${fmtRank(k3_rank)}</div>
                                <div class="text-gray-400 text-[10px]">(${k3_rec})</div>
                            </div>
                        </div>

                    </div>
                </td>
            `;

            tbody.appendChild(mainTr);
            tbody.appendChild(detailTr);
        }
        
        table.appendChild(thead);
        table.appendChild(tbody);
        tableContainer.appendChild(table);
    }

    function toggleDetail(index) {
        const detailRow = document.getElementById(`detail-${index}`);
        if (detailRow.classList.contains('hidden')) {
            detailRow.classList.remove('hidden');
        } else {
            detailRow.classList.add('hidden');
        }
    }

    // ✨ 상세 보기 영역을 클릭할 때마다 화면을 번갈아가며 보여주는 함수
    function cycleDetailView(index) {
        const views = ['local', 'world', 'korea'];
        let currentIndex = 0;

        // 현재 어떤 화면이 켜져 있는지 확인
        for (let i = 0; i < views.length; i++) {
            const viewEl = document.getElementById(`view-${views[i]}-${index}`);
            if (viewEl && !viewEl.classList.contains('hidden')) {
                currentIndex = i;
                break;
            }
        }

        // 다음 화면 인덱스 계산 (0 -> 1 -> 2 -> 0)
        const nextIndex = (currentIndex + 1) % views.length;

        // 모든 화면 숨기고 뱃지 비활성화
        views.forEach(view => {
            document.getElementById(`view-${view}-${index}`).classList.add('hidden');
            const badge = document.getElementById(`badge-${view}-${index}`);
            badge.classList.remove('bg-yellow-600', 'text-white', 'font-bold');
            badge.classList.add('bg-gray-700', 'text-gray-400');
        });

        // 다음 화면 보여주고 뱃지 활성화
        document.getElementById(`view-${views[nextIndex]}-${index}`).classList.remove('hidden');
        const activeBadge = document.getElementById(`badge-${views[nextIndex]}-${index}`);
        activeBadge.classList.remove('bg-gray-700', 'text-gray-400');
        activeBadge.classList.add('bg-yellow-600', 'text-white', 'font-bold');
    }

    function showLoading() { statusDiv.innerHTML = '<div class="loader mx-auto"></div>'; }
    function updateStatus(msg) { statusDiv.innerHTML = msg; }
    function displayError(msg) { statusDiv.innerHTML = `<span class="text-red-400">${msg}</span>`; tableContainer.innerHTML = ''; }
</script>
</body>
</html>
